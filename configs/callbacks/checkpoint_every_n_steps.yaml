checkpoint_every_n_steps:
  _target_: lightning.pytorch.callbacks.ModelCheckpoint
  save_top_k: -1 # save all checkpoints (not just best)
  save_last: True # saves last.ckpt whenever this callback fires
  dirpath: ${checkpointing.save_dir}/checkpoints
  verbose: True
  auto_insert_metric_name: False
  every_n_train_steps: 650 # optimizer steps (~1 epoch = 649 opt steps on MAESTRO 2xT4 batch=8 accum=4)
                            # Fixed from 2500: Lightning counts OPTIMIZER steps here, not batch steps
                            # 2500 opt steps = ~3.85 epochs = ~14.5 hrs → last.ckpt never written
                            # 650 opt steps = ~1 epoch = ~1 hr → safe checkpointing frequency
